<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
  <meta name="description" content="Panel de administración para Farmacéuticos Markos - Gestión de ventas, clientes y productos" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Farmacéuticos Markos" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <meta name="format-detection" content="telephone=no" />
  <title>MKS DashBoard - Registro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/css/style.css" />
  <script>window.addEventListener('load', () => document.getElementById('splashScreen')?.classList.add('hidden'));</script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <script defer src="/src/js/firebase.js"></script>
  <script defer src="/src/js/performance-optimizer.js"></script>
  <script defer src="/src/js/auth.js"></script>
  <script defer src="/src/js/firestore-optimizations.js"></script>
  <script defer src="/src/js/app.js"></script>
  <script defer src="/src/js/mobile-optimizations.js"></script>
</head>
<body>
  <!-- Pantalla de Carga -->
  <div id="splashScreen" class="splash-screen">
    <div class="spinner"></div>
    <img src="/assets/mks.png" alt="MKS" class="splash-logo">
  </div>

  <!-- Sección de Autenticación -->
  <section id="authView" class="view">
    <div class="auth-split-wrapper">
      <!-- Lado Izquierdo: Branding y Frase Pro -->
      <div class="auth-branding-side">
        <div class="branding-content">
          <div class="animated-logo-container">
            <img src="/assets/mks.png" alt="MKS Logo" class="premium-logo">
            <div class="logo-glow"></div>
          </div>
          <h1 class="branding-title">Gestiona tu negocio <br><span>en tiempo real.</span></h1>
          <p class="branding-subtitle">La plataforma inteligente para el control de Farmacéuticos Markos.</p>
          <div class="branding-graphic">
            <div class="mockup-dashboard">
              <div class="mockup-line"></div>
              <div class="mockup-line short"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Lado Derecho: Formulario Refinado -->
      <div class="auth-form-side">
        <div class="auth-card-premium">
          <a href="/" class="back-home-btn" title="Regresar al inicio">🏠</a>
          <h2 id="authTitle">Crear Nueva Cuenta</h2>
          <p class="auth-card-subtitle">Completa tus datos para registrarte</p>
          
          <form id="registerForm">
            <!-- Campos de registro optimizados -->
            <div id="registerExtraFields" class="registration-grid">
              <div class="input-group-premium"><input type="text" id="regNombre" required><label>Nombre</label></div>
              <div class="input-group-premium"><input type="text" id="regApellido" required><label>Apellido</label></div>
              <div class="input-group-premium full"><input type="date" id="regBirth" required><label>Fecha de Nacimiento</label></div>
              <div class="input-group-premium"><input type="tel" id="regTel" required><label>Celular</label></div>
              <div class="input-group-premium"><input type="text" id="regDni" maxlength="8" required><label>DNI</label></div>
            </div>

            <div class="input-group-premium">
              <input type="email" id="authEmail" required>
              <label>Correo electrónico</label>
            </div>
            
            <div class="input-group-premium">
              <input type="password" id="authPassword" required>
              <label>Contraseña</label>
            </div>
            
            <div class="auth-options">
              <label class="show-pass-label">
                <input type="checkbox" id="showPassToggle">
                <span>Mostrar contraseña</span>
              </label>
            </div>

            <button type="submit" id="btnAuthMain" class="btn-premium primary-gradient">
              <span class="btn-text">Completar Registro</span>
              <div class="btn-loader hidden"></div>
            </button>
          </form>

          <p class="auth-switch">
            ¿Ya tienes cuenta? <a href="/login">Ingresa aquí</a>
          </p>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
